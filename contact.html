<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Phipps Excavating & Land Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- PREMIUM CONTACT HERO --- */
    .contact-page-hero {
      position: relative;
      padding: 150px 0 110px; 
      text-align: center;
      color: #fff;
      overflow: hidden;
    }

    .contact-page-hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      /* UPDATED IMAGE PATH */
      background-image: linear-gradient(rgba(11, 31, 59, 0.88), rgba(11, 31, 59, 0.78)), url('images/contact-hero.jpeg');
      background-size: cover;
      background-position: center;
      z-index: -1;
      animation: slow-pan 30s infinite alternate ease-in-out;
    }

    .hero-subtitle {
      display: inline-block;
      font-weight: 900;
      color: #F2C200;
      text-transform: uppercase;
      letter-spacing: 5px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      border-bottom: 2px solid #F2C200;
      padding-bottom: 5px;
    }

    .contact-page-hero h1 {
      font-size: clamp(2.8rem, 9vw, 4.8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -4px; /* Tighter letters */
      line-height: 0.85;    /* Tighter vertical spacing */
      margin: 0 auto 20px;
      max-width: 900px;
      text-shadow: 0 0 20px rgba(242, 194, 0, 0.25), 0 12px 35px rgba(0,0,0,0.6);
    }

    .highlight { color: #F2C200; }

    .hero-description {
      max-width: 500px; /* Tighter container */
      margin: 0 auto;
      text-transform: uppercase;
      letter-spacing: 3px; 
      font-weight: 800;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.95);
      line-height: 1.1;
    }

    /* --- REGIONAL SECTION --- */
    .regional-section { background: #fcfcfc; padding: 60px 0; border-bottom: 1px solid #eee; }
    .flex-row { display: flex; flex-wrap: wrap; gap: 40px; align-items: center; }
    .flex-col-half { flex: 1; min-width: 320px; }
    
    .area-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 12px; 
    }

    .area-card { 
      background: #fff; 
      padding: 15px; 
      border: 1px solid #eee; 
      text-align: center; 
      transition: 0.3s;
    }
    
    .featured-area {
      grid-column: 1 / span 2;
      display: flex;
      justify-content: center; 
    }

    .inner-card {
      width: 100%;
      max-width: calc(50% - 6px); 
      background: #fff;
      padding: 15px;
      border: 1px solid #eee;
      text-align: center;
    }

    .area-card strong, .inner-card strong { display: block; font-size: 0.95rem; text-transform: uppercase; font-weight: 900; color: #0B1F3B; }
    .area-card p, .inner-card p { color: #F2C200; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-top: 2px; }

    /* --- CONTACT MAIN --- */
    .contact-main { padding: 80px 0 120px; }
    .info-item { margin-bottom: 25px; border-left: 4px solid #F2C200; padding-left: 20px; }
    .info-item strong { display: block; color: #F2C200; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; font-weight: 900; }
    .info-item p, .info-item a { font-size: 1.25rem; font-weight: 800; color: #0B1F3B; text-decoration: none; margin: 0; }

    /* --- FORM STYLING --- */
    .form-container { background: #fff; padding: 40px; border-top: 10px solid #F2C200; box-shadow: 0 30px 60px rgba(11, 31, 59, 0.1); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 15px; border: 2px solid #f2f2f2; background: #fafafa; font-family: 'Inter', sans-serif; font-size: 1rem; outline: none; }

    .submit-btn {
      width: 100%;
      background: #F2C200;
      color: #0B1F3B;
      padding: 18px;
      border: none;
      border-radius: 4px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s;
    }
    .submit-btn:hover { background: #0B1F3B; color: #fff; transform: translateY(-2px); }

    footer .social-links a { color: #F2C200 !important; border: 2px solid #F2C200 !important; text-decoration: none; padding: 10px 20px; }
    footer .social-links a:hover { background: #F2C200 !important; color: #0B1F3B !important; }

    @media (max-width: 480px) {
      .inner-card { max-width: 100%; }
      .contact-page-hero h1 { letter-spacing: -2px; }
    }
  </style>
</head>

      </ul>
    </div>

  <header class="contact-page-hero">
    <div class="container">
      <span class="hero-subtitle">Establish Your Foundation</span>
      <h1>Get In <span class="highlight">Touch</span></h1>
      <p class="hero-description">Built on <span class="highlight">Experience</span></p>
    </div>
  </header>

  </body>
</html>
