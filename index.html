<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phipps Excavating & Land Management | West Liberty, KY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- HERO ARCHITECTURE --- */
    .hero {
      position: relative;
      /* Changed to min-height so it expands if content is too tall */
      min-height: 100vh; 
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #000; 
      /* Added bottom padding to ensure the stats don't hit the very edge */
      padding-bottom: 40px; 
    }

    #hero-video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      z-index: 1;
      transform: translate(-50%, -50%);
      object-fit: cover; 
      filter: brightness(0.4) contrast(1.1);
    }

    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* --- HERO CONTENT --- */
    .hero .container {
      position: relative;
      padding: 0 20px;
      /* Clears the navbar (approx 80px) */
      padding-top: 100px; 
      z-index: 3;
      text-align: center;
      width: 100%;
      max-width: 1200px;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      line-height: 1.1;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 0; 
      text-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .logo {
      display: block;
      margin: -15px auto -15px auto; 
      max-width: 220px; 
      height: auto;
    }

    .hero-main-title {
      display: block;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .hero-sub-title {
      display: block;
      font-weight: 600; 
      font-size: 0.6em;
      letter-spacing: 6px; 
      color: #F2C200; 
      margin-top: 5px;
    }

    .hero p {
      margin: 15px 0 25px 0;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }

    /* --- COMPACT HERO STATS --- */
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 30px; 
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;     
    }

    .stat-value {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      font-weight: 800;
      color: #F2C200;
      text-transform: uppercase;
    }

    .stat-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.7);
    }

    .hero-accent { color: #F2C200; font-weight: 700; }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 768px) {
      .hero-stats { grid-template-columns: 1fr 1fr; gap: 20px; }
      .hero { padding-bottom: 60px; } /* More room for mobile thumbs */
      .logo { max-width: 180px; }
    }
  </style>
</head>
<body class="home-page">

  <nav class="navbar">

      <a href="index.html" class="nav-brand"><span>Phipps</span> Excavating</a>
      <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </div>
      <ul class="nav-links" id="nav-list">
        <li><a href="index.html" style="color: #F2C200 !important;">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="tel:6065480377" class="nav-cta-menu">Call Now</a></li>
      </ul>
    </div>
  </nav>

  <header class="hero">
    <video autoplay muted loop playsinline id="hero-video">
      <source src="videos/index-hero.mp4" type="video/mp4">
    </video>

    <div class="video-overlay"></div>

    <div class="container">
      <h1>
        <span class="hero-main-title">Expert Excavation</span>
        <span class="hero-sub-title">& Land Management</span>
      </h1>
      
      <img class="logo" src="logo.PNG" alt="Phipps Excavating Logo">
      
      <p>Building Kentucky on <span class="hero-accent">20+ years of experience</span></p>
      
      <div class="hero-btns">
        <a class="btn primary" href="tel:6065480377">Request Estimate</a>
        <a class="btn secondary facebook-btn" href="https://www.facebook.com/share/1DdmKdBbGn/" target="_blank">Message Us</a>
      </div>

      <div class="hero-stats">
        <div class="stat-item">
          <span class="stat-value">Fully Insured</span>
          <span class="stat-label">Licensed</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">20+ Years</span>
          <span class="stat-label">Experience</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">Quality</span>
          <span class="stat-label">Guaranteed</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">Free Estimates</span>
          <span class="stat-label">Trusted</span>
        </div>
      </div>
    </div>
  </header>

  </body>
</html>
