<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Phipps Excavating & Land Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- TIGHTENED PREMIUM HERO --- */
    .gallery-page-hero {
      position: relative;
      padding: 100px 0 60px; /* Reduced from 150/110 */
      text-align: center;
      color: #fff;
      overflow: hidden;
    }

    .gallery-page-hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(11, 31, 59, 0.88), rgba(11, 31, 59, 0.78)), url('aboutheaderimage.JPG');
      background-size: cover;
      background-position: center;
      z-index: -1;
      animation: slow-pan 30s infinite alternate ease-in-out;
    }

    .hero-subtitle {
      display: inline-block;
      font-weight: 900;
      color: #F2C200;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 0.8rem;
      margin-bottom: 10px; /* Tighter margin */
      border-bottom: 2px solid #F2C200;
      padding-bottom: 3px;
    }

    .gallery-page-hero h1 {
      font-size: clamp(2.5rem, 8vw, 4rem); /* Slightly smaller/tighter scale */
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -2px;
      line-height: 0.9;
      margin: 0 auto 15px;
      text-shadow: 0 0 20px rgba(242, 194, 0, 0.25), 0 12px 35px rgba(0,0,0,0.6);
    }

    .highlight { color: #F2C200; }

    .hero-description {
      max-width: 800px;
      margin: 0 auto;
      text-transform: uppercase;
      letter-spacing: 3px; 
      font-weight: 800;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.9);
    }

    /* --- TIGHTENED PULSE STYLES --- */
    .pulse-section { padding: 50px 0 80px; background: #fcfcfc; } /* Reduced padding */
    
    .pulse-wrapper {
      margin-bottom: 60px; /* Reduced from 100px for a tighter flow */
    }

    .section-title { 
      text-align: center; 
      margin-bottom: 25px; /* Reduced from 40px */
      font-weight: 900; 
      text-transform: uppercase; 
      letter-spacing: -1px;
      font-size: 1.8rem;
    }

    .pulse-container {
      position: relative;
      width: 100%;
      max-width: 1000px; /* Slightly narrower for a more focused look */
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 20px 40px rgba(11, 31, 59, 0.12);
      background: #0B1F3B;
    }

    .pulse-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .pulse-img.before {
      animation: pulse-fade 6s infinite ease-in-out;
      z-index: 2;
    }

    .pulse-img.after {
      z-index: 1;
    }

    @keyframes pulse-fade {
      0%, 15% { opacity: 1; }   
      40%, 65% { opacity: 0; }  
      90%, 100% { opacity: 1; } 
    }

    .pulse-badge {
      position: absolute;
      bottom: 20px; /* Moved in slightly */
      right: 20px;
      z-index: 10;
      background: rgba(11, 31, 59, 0.95);
      padding: 8px 16px;
      border-left: 4px solid #F2C200;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-text {
      color: #fff;
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 1.5px;
    }

    .dot {
      width: 6px; height: 6px;
      background: #F2C200;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* FOOTER TIGHTENING */
    footer { padding: 40px 0; }
    footer p { margin-top: 15px; font-size: 0.85rem; }

    @keyframes slow-pan { from { transform: scale(1); } to { transform: scale(1.05); } }

    @media (max-width: 768px) {
      .pulse-container { aspect-ratio: 4 / 3; }
      .pulse-badge { bottom: 15px; right: 15px; padding: 8px 15px; }
      .gallery-page-hero { padding: 80px 0 40px; }
    }
  </style>
</head>
<body class="gallery-page">

  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="nav-brand"><span>Phipps</span> Excavating</a>
      <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </div>
      <ul class="nav-links" id="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="gallery.html" style="color: #F2C200 !important;">Gallery</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="tel:6065480377" class="nav-cta-menu">Call Now</a></li>
      </ul>
    </div>
  </nav>

  <header class="small-hero gallery-page-hero">
    <div class="container">
      <span class="hero-subtitle">Visual Portfolio</span>
      <h1>The Art of <span class="highlight">Excavation</span></h1>
      <p class="hero-description">Precision Site Solutions</p>
    </div>
  </header>

  <section class="pulse-section">
    <div class="container">

      <div class="pulse-wrapper">
        <h2 class="section-title">Land <span class="highlight">Clearing</span></h2>
        <div class="pulse-container">
          <img src="land-clear-after.jpeg" class="pulse-img after" alt="After Clearing">
          <img src="land-clear-before.JPG" class="pulse-img before" alt="Before Clearing">
          <div class="pulse-badge">
            <span class="status-text">Transformation Live</span>
            <div class="dot"></div>
          </div>
        </div>
      </div>

      <div class="pulse-wrapper">
        <h2 class="section-title">Driveway <span class="highlight">Repair</span></h2>
        <div class="pulse-container">
          <img src="drive-after.JPG" class="pulse-img after" alt="After Driveway Repair">
          <img src="drive-before .JPG" class="pulse-img before" alt="Before Driveway Repair" style="animation-delay: 1.5s;">
          <div class="pulse-badge">
            <span class="status-text">Transformation Live</span>
            <div class="dot"></div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <footer>
    <div class="container">
      <div class="social-links">
        <a href="https://www.facebook.com/share/1DdmKdBbGn/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">Facebook</a>
      </div>
      <p>© 2026 Phipps Excavating & Land Management</p>
    </div>
  </footer>

  <a href="tel:6065480377" class="sticky-call">Call Now</a>

  <script>
    const menu = document.querySelector('#mobile-menu');
    const menuLinks = document.querySelector('#nav-list');
    if(menu) {
      menu.addEventListener('click', function() {
        menu.classList.toggle('is-active');
        menuLinks.classList.toggle('active');
      });
    }
  </script>
</body>
</html>
